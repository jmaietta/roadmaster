<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>555-62140 Installation Instructions</title>
  <style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:#0e0e0e;color:#d4d4d4;line-height:1.6;overflow-x:hidden}

/* Top bar */
.topbar{position:sticky;top:0;z-index:20;background:rgba(18,18,18,.92);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid #262626;padding:.6rem 1rem;
  display:flex;align-items:center;gap:.75rem}
.topbar a.back{color:#8ab4f8;text-decoration:none;font-size:.85rem;flex-shrink:0}
.topbar a.back:hover{text-decoration:underline}
.topbar h1{font-size:clamp(.85rem,2.5vw,1.1rem);font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.topbar .menu-btn{display:none;background:none;border:1px solid #444;
  color:#ccc;border-radius:6px;padding:.3rem .6rem;font-size:.8rem;cursor:pointer}

/* Chapter nav */
.layout{display:flex;min-height:calc(100vh - 48px)}
.sidebar{width:260px;flex-shrink:0;background:#141414;border-right:1px solid #222;
  padding:1rem 0;overflow-y:auto;position:sticky;top:48px;height:calc(100vh - 48px)}
.sidebar a{display:block;padding:.4rem 1rem;color:#999;text-decoration:none;
  font-size:.82rem;border-left:3px solid transparent;transition:all .12s}
.sidebar a:hover{color:#e0e0e0;background:#1a1a1a}
.sidebar a.active{color:#8ab4f8;border-left-color:#8ab4f8;background:#1a1a1a}
.content{flex:1;min-width:0;padding:1.5rem 1rem 4rem}

/* Chapter sections */
.chapter{margin-bottom:3rem;scroll-margin-top:60px}
.chapter-title{font-size:1.35rem;font-weight:700;color:#e8e8e8;
  margin-bottom:.35rem;padding-bottom:.5rem;border-bottom:1px solid #262626}
.chapter-sub{color:#777;font-size:.85rem;margin-bottom:1.25rem}

/* Page images in a grid */
.pages{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.pages.single{grid-template-columns:1fr;max-width:700px}
.page-card{background:#181818;border:1px solid #262626;border-radius:8px;
  overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s}
.page-card:hover{border-color:#444;transform:translateY(-2px)}
.page-card img{width:100%;height:auto;display:block}
.page-card .label{padding:.4rem .6rem;font-size:.72rem;color:#666;text-align:center}

/* Lightbox / Zoom overlay */
.lightbox{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.95);
  display:none;flex-direction:column;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox .lb-close{position:absolute;top:.75rem;right:.75rem;background:#333;
  color:#eee;border:none;border-radius:50%;width:40px;height:40px;font-size:1.3rem;
  cursor:pointer;z-index:101;display:flex;align-items:center;justify-content:center}
.lightbox .lb-nav{position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(50,50,50,.7);color:#eee;border:none;border-radius:50%;
  width:44px;height:44px;font-size:1.4rem;cursor:pointer;z-index:101;
  display:flex;align-items:center;justify-content:center}
.lightbox .lb-nav.prev{left:.75rem}
.lightbox .lb-nav.next{right:.75rem}
.lightbox .lb-counter{position:absolute;bottom:.75rem;left:50%;transform:translateX(-50%);
  color:#888;font-size:.8rem;z-index:101}
.lightbox .lb-viewport{width:100%;height:100%;overflow:auto;-webkit-overflow-scrolling:touch;
  display:flex;align-items:center;justify-content:center;touch-action:pan-x pan-y pinch-zoom}
.lightbox .lb-viewport img{max-width:none;max-height:none;width:auto;height:auto;
  transform-origin:center center;transition:none;user-select:none;-webkit-user-select:none}
.lightbox .lb-hint{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);
  color:#555;font-size:.75rem;z-index:101;pointer-events:none}

/* Back to top */
.back-to-top{position:fixed;bottom:1.25rem;right:1.25rem;background:#282828;color:#aaa;
  border:none;border-radius:50%;width:44px;height:44px;font-size:1.2rem;cursor:pointer;
  display:none;align-items:center;justify-content:center;z-index:10;
  box-shadow:0 2px 10px rgba(0,0,0,.5)}
.back-to-top:hover{background:#444}

/* Mobile */
@media(max-width:768px){
  .topbar .menu-btn{display:block}
  .sidebar{position:fixed;top:48px;left:-280px;width:280px;height:calc(100vh - 48px);
    z-index:30;transition:left .25s ease;box-shadow:none}
  .sidebar.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,.5)}
  .sidebar-overlay{display:none;position:fixed;inset:0;top:48px;z-index:29;background:rgba(0,0,0,.4)}
  .sidebar-overlay.open{display:block}
  .content{padding:1rem .5rem 3rem}
  .pages{grid-template-columns:1fr}
  .chapter-title{font-size:1.1rem}
}
</style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="index.html">&larr; Home</a>
    <h1>555-62140 Installation Instructions</h1>
  </div>
  <div class="content" style="max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem">
    <section class="chapter">
      <h2 class="chapter-title">Hedman LS Swap Headers</h2>
      <p class="chapter-sub">Installation Instructions &middot; 5 pages</p>
      <div class="pages single">
        <div class="page-card">
          <img src="images/555-62140/page-001.jpg" alt="Page 1" loading="eager" decoding="async">
          <div class="label">Page 1</div>
        </div>
        <div class="page-card">
          <img src="images/555-62140/page-002.jpg" alt="Page 2" loading="eager" decoding="async">
          <div class="label">Page 2</div>
        </div>
        <div class="page-card">
          <img src="images/555-62140/page-003.jpg" alt="Page 3" loading="eager" decoding="async">
          <div class="label">Page 3</div>
        </div>
        <div class="page-card">
          <img src="images/555-62140/page-004.jpg" alt="Page 4" loading="lazy" decoding="async">
          <div class="label">Page 4</div>
        </div>
        <div class="page-card">
          <img src="images/555-62140/page-005.jpg" alt="Page 5" loading="lazy" decoding="async">
          <div class="label">Page 5</div>
        </div>
      </div>
    </section>
  </div>
  
  <div class="lightbox">
    <button class="lb-close" aria-label="Close">&times;</button>
    <button class="lb-nav prev" aria-label="Previous">&lsaquo;</button>
    <button class="lb-nav next" aria-label="Next">&rsaquo;</button>
    <div class="lb-viewport">
      <img src="" alt="Zoomed page">
    </div>
    <div class="lb-counter"></div>
    <div class="lb-hint">Pinch to zoom &middot; Swipe to navigate</div>
  </div>
  <button class="back-to-top" aria-label="Back to top">&uarr;</button>
  <script>document.addEventListener('DOMContentLoaded', () => {
  // --- Sidebar toggle (mobile) ---
  const menuBtn = document.querySelector('.menu-btn');
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.querySelector('.sidebar-overlay');
  if (menuBtn && sidebar) {
    menuBtn.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      overlay && overlay.classList.toggle('open');
    });
    overlay && overlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
    });
    sidebar.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        sidebar.classList.remove('open');
        overlay && overlay.classList.remove('open');
      });
    });
  }

  // --- Active chapter tracking ---
  const chapters = document.querySelectorAll('.chapter');
  const navLinks = document.querySelectorAll('.sidebar a');
  if (chapters.length && navLinks.length) {
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          navLinks.forEach(l => l.classList.remove('active'));
          const link = document.querySelector('.sidebar a[href="#' + e.target.id + '"]');
          if (link) link.classList.add('active');
        }
      });
    }, { rootMargin: '-20% 0px -70% 0px' });
    chapters.forEach(ch => observer.observe(ch));
  }

  // --- Lightbox ---
  const lb = document.querySelector('.lightbox');
  if (!lb) return;
  const lbImg = lb.querySelector('.lb-viewport img');
  const lbClose = lb.querySelector('.lb-close');
  const lbPrev = lb.querySelector('.lb-nav.prev');
  const lbNext = lb.querySelector('.lb-nav.next');
  const lbCounter = lb.querySelector('.lb-counter');
  const allCards = Array.from(document.querySelectorAll('.page-card'));
  let currentIdx = 0;

  function openLightbox(idx) {
    currentIdx = idx;
    const card = allCards[idx];
    const img = card.querySelector('img');
    lbImg.src = img.src;
    lbImg.style.transform = '';
    lbImg.style.width = '';
    lbCounter.textContent = 'Page ' + (idx + 1) + ' of ' + allCards.length;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
    lbImg.src = '';
  }

  function navigate(dir) {
    const next = currentIdx + dir;
    if (next >= 0 && next < allCards.length) openLightbox(next);
  }

  allCards.forEach((card, i) => {
    card.addEventListener('click', () => openLightbox(i));
  });

  lbClose.addEventListener('click', closeLightbox);
  lbPrev.addEventListener('click', () => navigate(-1));
  lbNext.addEventListener('click', () => navigate(1));

  lb.addEventListener('click', (e) => {
    if (e.target === lb || e.target.classList.contains('lb-viewport')) closeLightbox();
  });

  document.addEventListener('keydown', (e) => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
  });

  // --- Swipe support in lightbox ---
  let touchStartX = 0;
  const viewport = lb.querySelector('.lb-viewport');
  viewport.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) touchStartX = e.touches[0].clientX;
  }, { passive: true });
  viewport.addEventListener('touchend', (e) => {
    if (e.changedTouches.length === 1) {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 60) navigate(diff > 0 ? 1 : -1);
    }
  }, { passive: true });

  // --- Back to top ---
  const btn = document.querySelector('.back-to-top');
  if (btn) {
    window.addEventListener('scroll', () => {
      btn.style.display = window.scrollY > 600 ? 'flex' : 'none';
    }, { passive: true });
    btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  }
});
</script>
</body>
</html>
